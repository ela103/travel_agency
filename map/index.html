<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Carto</title>
    <!-- Lien vers le CSS de Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        #map { height: 600px; }
    </style>
</head>
<body>

    <h1>Carte Carto</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // Initialisation de la carte
        let map = L.map('map').setView([48.8584, 2.2945], 13);  // Coordonnées par défaut (Paris)

        // Utilisation de l'URL des tuiles Carto
        L.tileLayer('https://clausa.app.carto.com/builder/1552bf76-1a8a-4e49-a61c-c693d11fae74', {
            attribution: '&copy; Carto',
            maxZoom: 18
        }).addTo(map);
    </script>

</body>
</html>
